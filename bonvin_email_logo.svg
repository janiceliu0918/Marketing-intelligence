<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" width="560" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="35%" r="85%">
      <stop offset="0%" stop-color="#911C42"/>
      <stop offset="100%" stop-color="#5E0F2A"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="560" height="200" fill="url(#bgGrad)"/>

  <!-- Top and bottom edge accent lines -->
  <rect x="0" y="0" width="560" height="2.5" fill="rgba(255,255,255,0.12)"/>
  <rect x="0" y="197.5" width="560" height="2.5" fill="rgba(255,255,255,0.12)"/>

  <!-- Wine bottle icon — centered at (280, 58) -->
  <g transform="translate(280, 58)">

    <!-- Capsule / foil top -->
    <path d="M -5,-50 Q -5,-55 0,-55 Q 5,-55 5,-50 L 5,-38 L -5,-38 Z"
          fill="rgba(255,255,255,0.60)"/>

    <!-- Neck + shoulder + body -->
    <path d="
      M -5,-38
      L  5,-38
      L  5,-18
      Q 14,-8 14,2
      L 14,42
      Q 14,50  6,50
      L -6,50
      Q -14,50 -14,42
      L -14,2
      Q -14,-8 -5,-18
      Z
    " fill="white"/>

    <!-- Subtle label area -->
    <rect x="-10" y="6" width="20" height="18" rx="1.5"
          fill="rgba(100,14,40,0.28)"/>
    <line x1="-6.5" y1="11.5" x2="6.5" y2="11.5"
          stroke="rgba(255,255,255,0.42)" stroke-width="0.7"/>
    <line x1="-6.5" y1="19"   x2="6.5" y2="19"
          stroke="rgba(255,255,255,0.42)" stroke-width="0.7"/>
  </g>

  <!-- BONVIN — main brand wordmark -->
  <text
    x="280"
    y="164"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="70"
    font-weight="bold"
    fill="white"
    text-anchor="middle"
    letter-spacing="9"
  >BONVIN</text>

  <!-- Flanking decorative rules -->
  <line x1="42"  y1="179" x2="145" y2="179" stroke="rgba(255,255,255,0.28)" stroke-width="0.8"/>
  <line x1="415" y1="179" x2="518" y2="179" stroke="rgba(255,255,255,0.28)" stroke-width="0.8"/>

  <!-- WINE & SPIRITS MERCHANTS — subtitle -->
  <text
    x="280"
    y="184"
    font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif"
    font-size="11.5"
    fill="rgba(255,255,255,0.80)"
    text-anchor="middle"
    letter-spacing="4.5"
  >WINE &amp; SPIRITS MERCHANTS</text>

</svg>
